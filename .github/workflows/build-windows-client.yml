name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "package-lock.json"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "src/**"
      - "src-tauri/**"
      - "scripts/**"
      - ".github/workflows/build-windows-client.yml"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Test question matcher
        run: npm run test:matcher

      - name: Build frontend
        run: npm run build

      - name: Build Windows desktop client
        run: npm run tauri -- build

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: interview-copilot-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
          if-no-files-found: error
