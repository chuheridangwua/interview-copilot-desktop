name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "package-lock.json"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "src/**"
      - "electron/**"
      - "resources/**"
      - "scripts/**"
      - ".github/workflows/build-windows-client.yml"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Pin npm 10
        run: npm install -g npm@10.9.2

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Test question matcher
        run: npm run test:matcher

      - name: Typecheck and build frontend
        run: npm run build

      - name: Build Windows desktop client
        run: npm run client:build

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: interview-copilot-windows
          path: |
            release/*.exe
            release/*.msi
          if-no-files-found: error
