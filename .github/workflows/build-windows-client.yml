name: Build Windows Client

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "package.json"
      - "package-lock.json"
      - "index.html"
      - "vite.config.ts"
      - "tsconfig*.json"
      - "src/**"
      - "src-tauri/**"
      - "scripts/**"
      - ".github/workflows/build-windows-client.yml"

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Tauri bundler tools
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/tauri
            ~/AppData/Local/tauri-rs
          key: ${{ runner.os }}-tauri-bundler-v1
          restore-keys: |
            ${{ runner.os }}-tauri-bundler-

      - name: Print tool versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version

      - name: Install frontend dependencies
        run: npm ci --registry=https://registry.npmjs.org/ --no-audit --no-fund

      - name: Test question matcher
        run: npm run test:matcher

      - name: Typecheck frontend
        run: npx tsc --noEmit

      - name: Build frontend
        run: npx vite build

      - name: Build Windows desktop client
        run: npm run tauri -- build

      - name: Upload Windows installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: interview-copilot-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/*.exe
          if-no-files-found: error
